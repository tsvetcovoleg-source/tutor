<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>AI Voice English Tutor MVP</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #22c55e;
      --danger: #ef4444;
      --disabled: #334155;
      --ring: rgba(34, 197, 94, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1222 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(100%, 440px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      line-height: 1.3;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status {
      margin: 0 0 16px;
      font-size: 1rem;
      font-weight: 600;
      min-height: 1.5rem;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    button {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      color: white;
      padding: 14px 16px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    #startBtn { background: var(--primary); }
    #stopBtn { background: var(--danger); }

    button:disabled {
      background: var(--disabled) !important;
      color: #cbd5e1;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (min-width: 640px) {
      h1 { font-size: 1.45rem; }
      button { min-height: 60px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AI Voice English Tutor (MVP)</h1>
    <p>Practice fintech/credit risk interview answers by speaking. Record and upload your answer for later analysis.</p>

    <div id="status" class="status" aria-live="polite">Ready</div>

    <div class="controls">
      <button id="startBtn" type="button">Start speaking</button>
      <button id="stopBtn" type="button" disabled>Stop recording</button>
    </div>

    <div class="hint">Microphone access requires HTTPS (or localhost in development).</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
